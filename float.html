<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>浮动</title>
    <style>
      .box {
        width: 200px;
        height: 200px;
        background-color: rgb(212, 160, 160);
        float: left;
      }
      .container {
        width: 500px;
        height: 400px;
        background-color: rgb(123, 122, 230);
      }
      ul {
        /* 去掉li标签默认的小圆点 */
        list-style-type: none;
      }
      .ul-box li {
        /* 设置浮动 */
        float: left;
        margin: 0 0.25rem;
      }
      .f-box {
        width: 500px;
        /* 清除浮动的方案：给父元素设定高度 */
        /* height: 500px; */
        /* 父元素设定overflow，清除浮动对同级元素的影响 */
        overflow: hidden;
        /* 一般情况下与clear同时使用 */
        clear: both;
        background-color: #666;
      }
      /* 通过伪对象的方式来清除浮动影响 */
      /* .f-box::after {
        content: "";
        display: block;
        clear: both;
      } */
      .s-box {
        width: 100px;
        height: 100px;
        background-color: aqua;
        margin: 0.5rem;
        float: left;
      }
      .s-box2 {
        width: 100px;
        height: 100px;
        background-color: rgb(214, 76, 22);
        margin: 0.3rem;
      }
      .s-box3 {
        width: 100px;
        height: 100px;
        background-color: rgb(214, 76, 22);
        /* 使用clear属性清除对应浮动的影响 */
        clear: both;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <div class="container"></div>
    <div class="f-box">
      <div class="s-box"></div>
      <div class="s-box"></div>
      <div class="s-box"></div>
      <!--后续的元素受到上面的浮动元素影响-->
      <div class="s-box3"></div>
    </div>
    <!--后续的元素受到上面的浮动元素影响-->
    <div class="s-box2"></div>
    <div>
      <ul class="ul-box">
        <li>
          <a href=""><span>导航1</span></a>
        </li>
        <li>
          <a href=""><span>导航2</span></a>
        </li>
        <li>
          <a href=""><span>导航3</span></a>
        </li>
        <li>
          <a href=""><span>导航4</span></a>
        </li>
      </ul>
    </div>
  </body>
</html>
