<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>绝对定位</title>
    <style>
      .box-1 {
        width: 300px;
        height: 200px;
        background-color: brown;
        /* 绝对定位 */
        position: absolute;
        left: 100px;
        top: 200px;
      }
      .box-2 {
        width: 100px;
        height: 100px;
        background-color: rgb(62, 158, 38);
      }
      .box-3 {
        width: 100px;
        height: 100px;
        background-color: rgb(37, 102, 175);
        /* 绝对定位 */
        position: absolute;
        left: 50px;
        top: 60px;
      }
    </style>
  </head>
  <body>
    <div class="box-1"></div>
    <div class="box-2"></div>
    <div class="box-3"></div>
  </body>
</html>
