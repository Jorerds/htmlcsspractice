<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SS3新特性——阴影</title>
    <style>
      .box-1 {
        width: 500px;
        height: 500px;
        background-color: yellow;
        margin: 0 auto;
        /* 设置阴影 */
        box-shadow: 10px 5px 30px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="box-1"></div>
  </body>
</html>
