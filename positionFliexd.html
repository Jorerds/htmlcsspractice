<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>固定定位</title>
    <style>
      .box-1 {
        width: 100px;
        height: 100px;
        background-color: blueviolet;
        /* 固定定位 */
        position: fixed;
        left: 100px;
        top: 100px;
      }
      .box-2 {
        width: 400px;
        height: 400px;
        background-color: rgb(27, 115, 216);
      }
    </style>
  </head>
  <body>
    <div class="box-1"></div>
    <div class="box-2"></div>
  </body>
</html>
